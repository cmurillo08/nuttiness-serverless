service: nuttiness-serverless
frameworkVersion: "3"
useDotenv: true

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  environment:
    DATABASE_URL: ${env:DATABASE_URL, ''}
    PGSCHEMA: ${env:PGSCHEMA, ''}
    APP_USERNAME: ${env:APP_USERNAME, ''}
    APP_PASSWORD: ${env:APP_PASSWORD, ''}
    SESSION_SECRET: ${env:SESSION_SECRET, ''}
    FRONTEND_ORIGIN: ${env:FRONTEND_ORIGIN, 'http://localhost:5173'}

functions:
  health:
    handler: backend/health/handler.handler
    events:
      - http:
          path: /api/v1/health
          method: get
          cors: true

  auth:
    handler: backend/auth/handler.handler
    events:
      - http:
          path: /api/v1/auth/login
          method: post
          cors: true
      - http:
          path: /api/v1/auth/logout
          method: post
          cors: true
      - http:
          path: /api/v1/auth/me
          method: get
          cors: true

  products:
    handler: backend/products/handler.handler
    events:
      - http:
          path: /api/v1/products
          method: get
          cors: true
      - http:
          path: /api/v1/products/{id}
          method: get
          cors: true
      - http:
          path: /api/v1/products
          method: post
          cors: true
      - http:
          path: /api/v1/products/{id}
          method: put
          cors: true
      - http:
          path: /api/v1/products/{id}
          method: delete
          cors: true
      - http:
          path: /api/v1/raw-products
          method: get
          cors: true
      - http:
          path: /api/v1/raw-products/{id}
          method: get
          cors: true
      - http:
          path: /api/v1/raw-products
          method: post
          cors: true
      - http:
          path: /api/v1/raw-products/{id}
          method: put
          cors: true
      - http:
          path: /api/v1/raw-products/{id}
          method: delete
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001
    noPrependStageInUrl: true