service: nuttiness-serverless
frameworkVersion: "3"

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  environment:
    DATABASE_URL: ${env:DATABASE_URL, ''}
    APP_USERNAME: ${env:APP_USERNAME, ''}
    APP_PASSWORD: ${env:APP_PASSWORD, ''}
    SESSION_SECRET: ${env:SESSION_SECRET, ''}

functions:
  health:
    handler: backend/health/handler.handler
    events:
      - http:
          path: /api/v1/health
          method: get
          cors: true

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3001
    noPrependStageInUrl: true